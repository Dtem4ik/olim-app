name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PNPM_VERSION: 10
  NODE_VERSION: 22

jobs:
  verify:
    name: lint · typecheck · unit · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (Biome)
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test:coverage

      - name: Build
        run: pnpm build

      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: next-build
          path: .next
          retention-days: 1

  content:
    name: content (schema · integrity · lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Validates the committed fixtures. No database needed — schema + integrity
      # + editorial lint only. Real content in olim-content runs the same check.
      - name: Validate content
        run: pnpm content:validate

  evals:
    name: AI evals (grounding gate)
    # Opt-in only. For now the grounding gate is run LOCALLY (`pnpm eval`); this job
    # stays defined but is skipped in CI until you flip it on, to avoid spending the
    # Gemini free-tier RPD on every PR. To enable: set the repo variable
    # RUN_AI_EVALS=true and the secrets GEMINI_API_KEY + EVAL_SUPABASE_URL +
    # EVAL_SUPABASE_KEY (a DB seeded with embeddings). Even when enabled, `pnpm eval`
    # self-skips (exit 0) if the key/DB are missing.
    if: ${{ vars.RUN_AI_EVALS == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # `pnpm eval` self-skips (exit 0) when GEMINI_API_KEY is absent OR no seeded
      # eval DB is configured (content falls back to the 2-step fixtures). To run
      # the real gate, set the repo secrets GEMINI_API_KEY + EVAL_SUPABASE_URL +
      # EVAL_SUPABASE_KEY (pointing at a stack seeded via content:import with
      # embeddings). Gate: ≥90% pass, 0 fabricated-source, 0 contradicted-fact.
      - name: Run AI evals
        run: pnpm eval
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.EVAL_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.EVAL_SUPABASE_KEY }}

  e2e:
    name: e2e · axe (both themes)
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Build
        run: pnpm build

      - name: Run e2e + axe
        run: pnpm e2e
        env:
          CI: "true"

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 7

  lighthouse:
    name: lighthouse (perf ≥90, a11y ≥95, per-route JS budget)
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Run Lighthouse CI
        run: pnpm lighthouse
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
